services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "5555:5555"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://jijo:jijopassword@db:5432/jijoappdb

  # 🚀 FRONTEND SERVICE (UNCOMMENTED & OPTIMIZED)
  frontend:
    build:
      # 📂 Points to the directory containing your frontend code and Dockerfile
      context: ./frontend
    ports:
      - "5173:5173" # Vite local development preview port
    volumes:
      # Mounts your local frontend changes so the container reflects edits instantly
      - ./frontend:/app
      # Prevents your local host node_modules from overwriting the container's layout
      - /app/node_modules
    depends_on:
      - app
    environment:
      # 🔌 Directs your React browser app to communicate with your Express API container port
      - VITE_API_URL=http://localhost:3000/api
      # ⚡ Directs your React browser app to push authorization handshakes to Django
      - VITE_DJANGO_APP_URL=http://localhost:8000/auth/callback/

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: jijo
      POSTGRES_PASSWORD: jijopassword
      POSTGRES_DB: jijoappdb   
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: